<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musikspelet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Inloggningsskärm -->
    <div id="login-screen" class="screen active">
        <h1>Gissa Året</h1>
        <p>Logga in med ditt Spotify Premium-konto för att starta spelet.</p>
        <button id="login-btn">Logga in med Spotify</button>
    </div>

    <!-- Spelskärm (Visas efter inloggning) -->
    <div id="game-screen" class="screen">
        <header>
            <div class="controls">
                <button id="draw-card-btn">Dra ny låt</button>
                <button id="lock-in-btn" disabled>Lås in gissning</button>
            </div>
            
            <!-- Mysteriekortet -->
            <div id="mystery-card" class="card hidden" draggable="true">
                <span class="question-mark">?</span>
                <div class="card-details" style="display: none;">
                    <p id="track-name">Låtnamn</p>
                    <p id="track-artist">Artist</p>
                    <h2 id="track-year">År</h2>
                </div>
            </div>
        </header>

        <main>
            <!-- Spelarflikar -->
            <div class="tabs">
                <button class="tab-btn active" data-player="0">Du</button>
                <button class="tab-btn" data-player="1">Syrran 1</button>
                <button class="tab-btn" data-player="2">Syrran 2</button>
                <button class="tab-btn" data-player="3">Mamma</button>
                <button class="tab-btn" data-player="4">Pappa</button>
            </div>

            <!-- Tidslinjen -->
            <div id="timeline-board" class="timeline">
                <div class="dropzone" id="drop-start">Släpp här</div>
                <!-- Placerade kort hamnar här -->
            </div>
        </main>
    </div>
    
    <script src="https://sdk.scdn.co/spotify-player.js"></script>
    <script src="script.js"></script>
</body>
</html>
