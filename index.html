        @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,900&family=Manrope:wght@500;800&family=JetBrains+Mono:wght@700&display=swap');
        :root{
          --bg:#F6F0E4; --ink:#141210; --paper:#FFFFFF; --terracotta:#FF4D1C; --mustard:#FFC20E; --green:#2D7D6B;
          --shadow:8px 8px 0 var(--ink);
          --border:4px solid var(--ink);
        }
        *{box-sizing:border-box}
        html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:Manrope,system-ui,sans-serif; overflow-x:hidden; max-width:100vw}
        button,input{font:inherit}
        .hitguessr-root{position:relative;min-height:100vh;display:flex;flex-direction:column;isolation:isolate;overflow-x:clip;max-width:100vw}
        /* dot grid */
        .hitguessr-root::before{
          content:"";position:fixed;inset:0;z-index:-2;
          background-image: radial-gradient(circle at 1px 1px, rgba(20,18,16,0.18) 1.2px, transparent 0);
          background-size:24px 24px;
          pointer-events:none;
        }
        /* grain */
        .grain{
          position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:0.04;
          background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }
        .watermark{
          position:fixed;inset:0;display:grid;place-items:center;pointer-events:none;z-index:-1;overflow:hidden;
        }
        .watermark span{
          font-family:Fraunces,serif;font-weight:900;font-size:clamp(64px,14vw,180px);line-height:0.8;letter-spacing:-0.06em;
          color:var(--ink);opacity:0.035;user-select:none;white-space:nowrap;transform:rotate(-6deg);
          max-width:100vw;overflow:hidden;text-align:center;display:block;
        }
        /* screens */
        .screen{display:none;min-height:100vh;flex-direction:column;max-width:100vw;overflow-x:clip}
        .screen.is-active{display:flex}
        #screen-start{align-items:center;justify-content:center;padding:32px 24px}
        .ticket{
          width:100%;max-width:min(480px, calc(100vw - 56px));background:var(--paper);border:var(--border);box-shadow:8px 8px 0 var(--ink);
          transform:rotate(-1deg);padding:0;position:relative;margin:0;
        }
        .ticket-inner{transform:rotate(1deg);padding:36px 32px 28px}
        .eyebrow{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;color:var(--ink);opacity:0.7;margin:0 0 14px}
        .eyebrow--small{margin:0;opacity:1}
        .wordmark{font-family:Fraunces,serif;font-weight:900;font-size:64px;line-height:0.9;letter-spacing:-0.04em;margin:0 0 12px}
        .tagline{font-size:16px;line-height:1.4;opacity:0.75;margin:0 0 28px;max-width:32ch}
        .field{margin-bottom:18px}
        .field label{display:block;font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px;font-weight:700}
        .field input{width:100%;padding:14px 16px;border:3px solid var(--ink);background:var(--paper);outline:none;transition:all 0.18s cubic-bezier(.34,1.56,.64,1);font-weight:800}
        .field input::placeholder{opacity:0.4;font-weight:500}
        .field input:focus{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
        .btn{appearance:none;border:3px solid var(--ink);background:var(--paper);color:var(--ink);padding:12px 18px;font-weight:800;letter-spacing:0.02em;cursor:pointer;transition:all 0.18s cubic-bezier(.34,1.56,.64,1);display:inline-flex;align-items:center;justify-content:center;gap:8px;text-transform:uppercase;font-size:13px;box-shadow:4px 4px 0 var(--ink)}
        .btn:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 var(--ink)}
        .btn:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
        .btn--primary{background:var(--terracotta);color:white}
        .btn--secondary{background:var(--paper)}
        .btn--lg{width:100%;padding:16px 22px;font-size:15px;margin-top:8px;box-shadow:6px 6px 0 var(--ink)}
        .btn--lg:hover{box-shadow:8px 8px 0 var(--ink)}
        .btn:disabled{opacity:0.35;cursor:not-allowed;box-shadow:none;pointer-events:none}
        .hint{font-size:12px;opacity:0.6;margin:10px 0 0;line-height:1.4}
        .spotify-panel{margin:20px 0 10px;padding:16px;border:3px dashed var(--ink);background:rgba(255,194,14,0.18)}
        .spotify-connected{margin-top:14px}
        .spotify-status{font-weight:800;font-size:13px;margin:0 0 10px}
        /* topbar */
        .topbar{position:sticky;top:0;z-index:20;background:var(--paper);border-bottom:var(--border);display:flex;justify-content:space-between;align-items:center;padding:12px 20px;gap:12px}
        .topbar__identity{display:flex;align-items:center;gap:14px}
        .player-label{font-weight:800;font-size:14px;letter-spacing:0.02em;padding:6px 12px;background:var(--mustard);border:2px solid var(--ink);transform:rotate(-0.6deg)}
        .topbar__stats{display:flex;gap:12px}
        .stat{display:flex;align-items:baseline;gap:8px;border:3px solid var(--ink);padding:6px 14px;background:var(--paper);box-shadow:3px 3px 0 var(--ink)}
        .stat__value{font-family:Fraunces,serif;font-weight:900;font-size:28px;line-height:1;letter-spacing:-0.04em}
        .stat__label{font-family:'JetBrains Mono',monospace;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;font-weight:700;opacity:0.7}
        /* stage */
        .stage{flex:1;display:flex;align-items:center;justify-content:center;padding:48px 24px 28px;position:relative}
        .player-console{display:flex;flex-direction:column;align-items:center;gap:18px}
        .play-toggle{position:absolute;width:30%;height:30%;left:50%;top:50%;margin:-15% 0 0 -15%;border-radius:50%;background:var(--mustard);border:4px solid var(--ink);box-shadow:6px 6px 0 var(--ink);display:grid;place-items:center;cursor:pointer;transition:transform 0.22s cubic-bezier(.34,1.56,.64,1), background 0.2s, box-shadow 0.2s;z-index:3}
        .play-toggle:hover{transform:scale(1.08)}
        .play-toggle:active{transform:scale(0.94)}
        .play-toggle__icon{width:0;height:0;border-left:16px solid var(--ink);border-top:10px solid transparent;border-bottom:10px solid transparent;transform:translateX(2px);transition:all 0.2s}
        #mystery-card.is-playing .play-toggle{background:var(--green);animation:pulse 1.2s infinite}
        #mystery-card.is-playing .play-toggle .play-toggle__icon{width:14px;height:16px;border:none;background:transparent;position:relative;transform:none}
        #mystery-card.is-playing .play-toggle .play-toggle__icon::before,#mystery-card.is-playing .play-toggle .play-toggle__icon::after{content:"";position:absolute;top:0;width:4px;height:100%;background:var(--paper);border:2px solid var(--ink)}
        #mystery-card.is-playing .play-toggle .play-toggle__icon::before{left:0}#mystery-card.is-playing .play-toggle .play-toggle__icon::after{right:0}
        #mystery-card.is-revealed .play-toggle{opacity:0;pointer-events:none;transform:scale(0.6)}
        /* mystery card */
        #mystery-card{width:min(380px,72vw);aspect-ratio:1;position:relative;isolation:isolate;touch-action:none;user-select:none;border-radius:50%}
        .card__disc{
          position:absolute;inset:0;border-radius:50%;z-index:0;
          border:2px solid var(--ink);
          background:
            radial-gradient(circle at center, var(--terracotta) 0 14%, #111 14.5% 16%, transparent 16.5%),
            repeating-radial-gradient(circle at center, #0e0e0e 0 2px, #222 2px 3px, #111 3px 5px);
          box-shadow:0 8px 24px rgba(0,0,0,0.25);
        }
        #mystery-card.is-playing .card__disc{animation:spin-disc 2.2s linear infinite}
        #mystery-card.is-dragging{cursor:grabbing;z-index:30}
        .card--mystery .card__face{
          position:absolute;width:42%;height:42%;left:50%;top:50%;margin:-21% 0 0 -21%;border-radius:50%;
          background:var(--paper);border:4px solid var(--ink);box-shadow:var(--shadow);
          display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6%;text-align:center;
          transition:transform 0.2s, opacity 0.2s;z-index:2;
        }
        .card--mystery .card__face--hidden .card__question{font-family:Fraunces,serif;font-weight:900;font-size:15px;opacity:0;margin:0}
        .card__prompt{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;line-height:1.4;opacity:0.7;max-width:20ch}
        .card--mystery .card__face--revealed{opacity:0;pointer-events:none;transform:translateY(8px) scale(0.98)}
        #mystery-card.is-revealed .card__face--hidden{opacity:0;pointer-events:none;transform:scale(0.96) rotate(-2deg)}
        #mystery-card.is-revealed .card__face--revealed{opacity:1;pointer-events:auto;transform:none}
        #mystery-card.is-incorrect .card__face--revealed{animation:shake-hard 0.42s cubic-bezier(.36,.07,.19,.97) both}
        .card__art-slot{width:60%;height:60%;border-radius:50%;border:3px solid var(--ink);overflow:hidden;margin-bottom:8%;background:#eee;flex-shrink:0}
        .card__art{width:100%;height:100%;object-fit:cover;display:block}
        .card__year{font-family:Fraunces,serif;font-weight:900;font-size:16px;line-height:1;margin:0 0 2px;letter-spacing:-0.02em}
        .card__title{font-weight:800;font-size:9px;line-height:1.15;margin:0 0 2px}
        .card__artist{font-size:8px;opacity:0.7;margin:0;font-weight:500}
        .card__prompt{font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;opacity:0.7;max-width:26ch;text-align:center;margin:0}
        /* feedback */
        .feedback{
          position:fixed;left:50%;bottom:160px;transform:translateX(-50%) translateY(16px);
          background:var(--paper);border:3px solid var(--ink);box-shadow:6px 6px 0 var(--ink);
          padding:12px 18px;font-weight:800;font-size:14px;letter-spacing:0.01em;opacity:0;pointer-events:none;
          transition:all 0.36s cubic-bezier(.34,1.56,.64,1);z-index:50;white-space:nowrap;
        }
        .feedback.is-visible{opacity:1;transform:translateX(-50%) translateY(0);animation:slide-up 0.36s cubic-bezier(.34,1.56,.64,1)}
        .feedback--correct{background:var(--green);color:white;border-color:var(--ink)}
        .feedback--incorrect{background:var(--terracotta);color:white}
        /* dock */
        .timeline-dock{background:var(--mustard);border-top:4px solid var(--ink);box-shadow:inset 0 8px 0 rgba(0,0,0,0.06);padding:20px 0 18px;position:sticky;bottom:0;z-index:10}
        .timeline-dock__label{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;letter-spacing:0.22em;text-transform:uppercase;display:flex;align-items:center;gap:12px;padding:0 32px;margin:0 0 12px}
        .timeline-dock__label::before,.timeline-dock__label::after{content:"";height:2px;background:var(--ink);flex:1;opacity:0.25}
        .timeline{display:flex;align-items:flex-end;justify-content:center;gap:14px;overflow-x:auto;overflow-y:hidden;padding:12px 32px;scroll-snap-type:x proximity;scrollbar-width:none;-ms-overflow-style:none;min-height:148px}
        .timeline::-webkit-scrollbar{display:none}
        .timeline-card{flex:0 0 148px;width:148px;height:148px;background:var(--paper);border:3px solid var(--ink);box-shadow:4px 4px 0 rgba(0,0,0,0.2);display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:12px 8px 8px;transform:rotate(-0.6deg);transition:all 0.22s cubic-bezier(.34,1.56,.64,1);scroll-snap-align:start;animation:drop-in 0.4s cubic-bezier(.34,1.56,.64,1) both}
        .timeline-card:nth-child(even){transform:rotate(0.8deg)}
        .timeline-card:hover{transform:translateY(-8px) scale(1.03) rotate(0deg);box-shadow:8px 12px 0 rgba(0,0,0,0.22);z-index:2}
        .timeline-card__art{width:80px;height:80px;border-radius:50%;border:2px solid var(--ink);overflow:hidden;flex-shrink:0;margin-bottom:8px;background:#ddd}
        .timeline-card__art img{width:100%;height:100%;object-fit:cover;display:block}
        .timeline-card__year{font-family:Fraunces,serif;font-weight:900;font-size:20px;line-height:1;margin:0}
        .timeline-card__title{font-weight:800;font-size:11px;line-height:1.1;margin:2px 0 0;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
        .timeline-gap{flex:0 0 14px;width:14px;height:108px;background:rgba(0,0,0,0.1);border-radius:999px;border:2px dashed transparent;transition:all 0.22s cubic-bezier(.34,1.56,.64,1);position:relative;scroll-snap-align:center;cursor:pointer}
        .timeline-gap:hover{background:rgba(0,0,0,0.18);width:20px}
        .timeline-gap.is-target{width:100px;background:var(--paper);border:3px solid var(--ink);box-shadow:inset 0 0 0 2px var(--mustard), 4px 4px 0 var(--ink);height:120px}
        .timeline-gap.is-target::after{content:"DROP";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-6deg);font-family:'JetBrains Mono',monospace;font-weight:700;font-size:10px;letter-spacing:0.12em;background:var(--ink);color:var(--paper);padding:3px 6px}
        /* end screen */
        #screen-end{align-items:center;justify-content:center;padding:40px 20px}
        .end-card{width:100%;max-width:min(560px, calc(100vw - 32px));background:var(--paper);border:var(--border);box-shadow:10px 10px 0 var(--ink);transform:rotate(0.6deg);padding:0;margin:12px}
        .end-card-inner{transform:rotate(-0.6deg);padding:36px 32px 28px}
        .end-title{font-family:Fraunces,serif;font-weight:900;font-size:48px;line-height:0.95;letter-spacing:-0.04em;margin:6px 0 10px}
        .end-score{font-weight:800;font-size:15px;margin:0 0 20px;opacity:0.8}

        @keyframes spin-disc{from{transform:translateX(58%) rotate(0deg)}to{transform:translateX(58%) rotate(360deg)}}

        @keyframes shake-hard{10%,90%{transform:translateX(-2px)}20%,80%{transform:translateX(4px)}30%,50%,70%{transform:translateX(-8px)}40%,60%{transform:translateX(8px)}}
        @keyframes slide-up{from{transform:translateX(-50%) translateY(16px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
        @keyframes pulse{0%,100%{box-shadow:6px 6px 0 var(--ink), 0 0 0 0 rgba(45,125,107,0.4)}50%{box-shadow:6px 6px 0 var(--ink), 0 0 0 14px rgba(45,125,107,0)}}
        /* responsive */
        @media (max-width:720px){
          .wordmark{font-size:48px}
          .topbar{padding:10px 14px}
          .stat{padding:4px 10px}
          .stat__value{font-size:22px}
          .stage{padding:28px 16px 18px}
          .player-console{flex-direction:column;gap:28px}
          .play-toggle{width:84px;height:84px}
          #mystery-card{width:min(320px,84vw)}
          .card__art-slot{width:110px;height:110px}
          .card__year{font-size:36px}
          .timeline-dock{padding:14px 0 12px}
          .timeline-dock__label{padding:0 18px}
          .timeline{padding:10px 18px;gap:10px;min-height:108px}
          .timeline-card{flex:0 0 98px;width:98px;height:108px;padding:8px 6px 6px}
          .timeline-card__art{width:54px;height:54px}
          .timeline-gap{height:76px}
          .timeline-gap.is-target{height:88px}
          .end-title{font-size:36px}
          .ticket-inner,.end-card-inner{padding:28px 20px 22px}
        }
