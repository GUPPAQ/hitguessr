<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>HitGuessr</title>

    <!-- Inter font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/globals.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

    <div id="app">

        <!-- Landing Screen -->
        <main id="landing-screen" class="screen">

            <section class="hero">

                <p class="eyebrow">
                    🎵 The music timeline game
                </p>

                <h1>
                    Hit<span>Guessr</span>
                </h1>

                <p class="hero-description">
                    Listen to songs. Guess the year.
                    Build your timeline.
                </p>

                <button class="primary-button">
                    Start Game
                </button>

            </section>


        </main>

            <!-- Setup Screen -->
    <main id="setup-screen" class="screen hidden">

        <section class="hero">

            <p class="eyebrow">
                🎵 Setup
            </p>

            <h1>
                Choose mode
            </h1>

            <div class="mode-grid">


                <div class="card mode-card">

                    <div class="mode-icon">
                        🎮
                    </div>

                    <h2>
                        Single Device
                    </h2>

                    <p>
                        Play together on one screen
                    </p>

                </div>



                <div class="card mode-card disabled">

                    <div class="mode-icon">
                        🌎
                    </div>

                    <h2>
                        Online
                    </h2>

                    <p>
                        Coming soon
                    </p>

                </div>


            </div>

        </section>

    </main>

    </div>


    <!-- JavaScript -->
    <script type="module" src="js/app.js"></script>

</body>
</html>
